name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:quiet

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e:quiet
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-failure-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - run: docker compose -f docker-compose.yml config
      - run: docker compose --progress quiet -f docker-compose.yml build app verify e2e cloudflare
      - run: docker compose --progress quiet -f docker-compose.yml run --rm verify
      - run: docker compose --progress quiet -f docker-compose.yml run --rm e2e
      - run: docker compose --progress quiet -f docker-compose.yml run --rm cloudflare

  publish:
    if: github.ref == 'refs/heads/main'
    needs:
      - verify
      - e2e
      - compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          target: app
          push: true
          tags: |
            ghcr.io/lkjsxc/lkjstr:latest
            ghcr.io/lkjsxc/lkjstr:sha-${{ github.sha }}
