name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:repo

  docker-final:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - run: docker compose -f docker-compose.yml config
      - run: docker compose --progress quiet -f docker-compose.yml build app verify cloudflare app-smoke
      - run: docker compose --progress quiet -f docker-compose.yml run --rm verify
      - run: docker compose --progress quiet -f docker-compose.yml run --rm cloudflare
      - run: docker compose --progress quiet -f docker-compose.yml run --rm app-smoke

  publish:
    if: github.ref == 'refs/heads/main'
    needs:
      - docker-final
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          target: app
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/lkjsxc/lkjstr:latest
            ghcr.io/lkjsxc/lkjstr:sha-${{ github.sha }}

  deploy-cloudflare:
    if: github.ref == 'refs/heads/main' && vars.CLOUDFLARE_DEPLOY_ENABLED == 'true'
    needs:
      - docker-final
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: rustup target add wasm32-unknown-unknown
      - run: cargo install wasm-pack --locked --version 0.15.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm cloudflare:dry-run:built
      - run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
