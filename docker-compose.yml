services:
  app:
    build:
      context: .
      target: app
    image: lkjstr:local
    ports:
      - '5173:5173'

  verify:
    build:
      context: .
      target: verify
    image: lkjstr-verify:local

  app-smoke:
    build:
      context: .
      target: app-smoke
    image: lkjstr-app-smoke:local

  cloudflare:
    build:
      context: .
      target: cloudflare
    image: lkjstr-cloudflare:local
